{{- if not .Values.existingSecret }}
{{- if not .Values.config.masterKey }}
{{- fail "config.masterKey is required (64 hex chars — openssl rand -hex 32), or set existingSecret" }}
{{- end }}
{{- if and (not .Values.postgres.enabled) (not .Values.config.databaseUrl) }}
{{- fail "config.databaseUrl is required when postgres.enabled=false, or set existingSecret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oarlock.fullname" . }}
  labels:
    {{- include "oarlock.labels" . | nindent 4 }}
type: Opaque
stringData:
  OARLOCK_MASTER_KEY: {{ .Values.config.masterKey | quote }}
  {{- if not .Values.postgres.enabled }}
  DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  {{- end }}
{{- end }}
